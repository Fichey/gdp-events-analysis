version: "3.9"

# PRODUCTION environment
services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: gdp_events
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d gdp_events"]
      interval: 10s
      retries: 5

  backend:
    build: ./backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://app:app@db:5432/gdp_events
    ports:
      - "8000:8000"

  ingestion:
    build: ./ingestion
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://app:app@db:5432/gdp_events
      INGEST_YEAR_START: "2010"
      INGEST_YEAR_END: "2025"
      INGEST_INTERVAL_HOURS: "24"

  processing:
    build: ./processing
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://app:app@db:5432/gdp_events
      INGEST_YEAR_START: "2010"
      INGEST_YEAR_END: "2025"

  frontend:
    build: ./frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
